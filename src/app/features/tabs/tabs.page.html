<ion-tabs (ionTabsWillChange)="onTabChange()">
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/">
      <ion-icon name="home"></ion-icon>
      <ion-label>{{ 'tabs.home' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="compare" href="/compare">
      <ion-icon name="git-compare-outline"></ion-icon>
      <ion-label>{{ 'tabs.compare' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="favorites" href="/favorites">
      <ion-icon name="heart"></ion-icon>
      <ion-label>{{ 'tabs.favorites' | translate }}</ion-label>
      @if (favoriteCount() > 0) {
        <ion-badge color="danger">{{ favoriteCount() }}</ion-badge>
      }
    </ion-tab-button>

    <ion-tab-button tab="settings" href="/settings">
      <ion-icon name="settings"></ion-icon>
      <ion-label>{{ 'tabs.settings' | translate }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
