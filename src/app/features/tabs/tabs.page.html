<ion-tabs (ionTabsWillChange)="onTabChange()">
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/tabs/home">
      <ion-icon name="home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="browse" href="/tabs/browse">
      <ion-icon name="grid"></ion-icon>
      <ion-label>Browse</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="favorites" href="/tabs/favorites">
      <ion-icon name="heart"></ion-icon>
      <ion-label>Favorites</ion-label>
      @if (favoriteCount() > 0) {
        <ion-badge color="danger">{{ favoriteCount() }}</ion-badge>
      }
    </ion-tab-button>

    <ion-tab-button tab="settings" href="/tabs/settings">
      <ion-icon name="settings"></ion-icon>
      <ion-label>Settings</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
