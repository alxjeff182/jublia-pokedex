@if (compact) {
  <div
    class="stat-row compact"
    [class.highlight]="highlight"
    [class.muted-value]="mutedValue"
    [attr.aria-label]="ariaLabel"
    role="group"
  >
    <span class="sr-only">{{ label }}</span>
    <span class="stat-value" aria-hidden="true">{{ value }}</span>
    <ion-progress-bar
      aria-hidden="true"
      [value]="ratio"
      color="primary"
    ></ion-progress-bar>
  </div>
} @else {
  <div
    class="stat-row"
    [class.highlight]="highlight"
    role="group"
    [attr.aria-label]="ariaLabel"
  >
    <span class="stat-name">{{ name | statName }}</span>
    <span class="stat-value">{{ value }}</span>
    <ion-progress-bar
      aria-hidden="true"
      [value]="ratio"
      color="primary"
    ></ion-progress-bar>
  </div>
}
