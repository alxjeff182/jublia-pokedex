<!DOCTYPE html>

<head>
  <meta charset="utf-8" />

  <meta name="description"
    content="Browse and search all Pokémon with My Pokedex by Jublia AI. Filter by type, save favorites, and explore stats, moves, and evolution chains." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://alxjeff182.github.io/jublia-pokedex/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="My Pokedex by Jublia AI" />
  <meta property="og:title" content="My Pokedex by Jublia AI" />
  <meta property="og:description"
    content="Browse and search all Pokémon with My Pokedex by Jublia AI. Filter by type, save favorites, and explore stats, moves, and evolution chains." />
  <meta property="og:image" content="https://alxjeff182.github.io/jublia-pokedex/assets/icon/pokeball.png" />

  <meta name="twitter:card" content="summary_large_image" />

  <meta name="color-scheme" content="light dark" />
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('CapacitorStorage.jublia_dex_theme');
        var isDark =
          stored === 'dark' ||
          (stored === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(
          isDark ? 'ion-palette-dark' : 'ion-palette-light',
        );
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      } catch (e) {
        document.documentElement.classList.add('ion-palette-light');
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
